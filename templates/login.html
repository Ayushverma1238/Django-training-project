{% extends 'base.html' %}
{% load static %}

{% block title %}Login - LUXE{% endblock %}

{% block content %}

<style>
/* Background */
.background-radial-gradient {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    background-color: hsl(218, 41%, 15%);
    background-image: radial-gradient(650px circle at 0% 0%,
            hsl(218, 41%, 35%) 15%,
            hsl(218, 41%, 30%) 35%,
            hsl(218, 41%, 20%) 75%,
            hsl(218, 41%, 19%) 80%,
            transparent 100%),
        radial-gradient(1250px circle at 100% 100%,
            hsl(218, 41%, 45%) 15%,
            hsl(218, 41%, 30%) 35%,
            hsl(218, 41%, 20%) 75%,
            hsl(218, 41%, 19%) 80%,
            transparent 100%);
}

/* Container */
.login-container {
    width: 90%;
    max-width: 1000px;
}

/* Card */
.login-card {
    display: flex;
    flex-wrap: wrap;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* Left form */
.login-form {
    flex: 1;
    padding: 40px;
    min-width: 300px;
}

.login-form h1 {
    text-align: center;
    margin-bottom: 30px;
}

/* Input */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 5px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

/* Button */
.login-btn {
    width: 100%;
    padding: 12px;
    background: #6a11cb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.login-btn:hover {
    background: #5011a3;
}

/* Right image */
.login-image {
    flex: 1;
    min-width: 300px;
}

.login-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Error */
.error {
    color: red;
    margin-bottom: 10px;
}

/* Responsive */
@media (max-width: 768px) {
    .login-card {
        flex-direction: column;
    }
}
</style>

<section class="background-radial-gradient">

    <div class="login-container">
        <div class="login-card">

            <!-- Left -->
            <div class="login-form">
                <h1>Login</h1>

                <form method="POST">
                    {% csrf_token %}

                    <div class="error">{{ error }}</div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="userName" />
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" />
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>
            </div>

            <!-- Right -->
            <div class="login-image">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp" />
            </div>

        </div>
    </div>

</section>

{% endblock %}
