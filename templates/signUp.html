{% extends 'base.html' %}
{% load static %}

{% block title %}Signup - LUXE{% endblock %}

{% block content %}

<style>
/* Background */
.background-radial-gradient {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    background-color: hsl(218, 41%, 15%);
    background-image: radial-gradient(650px circle at 0% 0%,
            hsl(218, 41%, 35%) 15%,
            hsl(218, 41%, 30%) 35%,
            hsl(218, 41%, 20%) 75%,
            hsl(218, 41%, 19%) 80%,
            transparent 100%),
        radial-gradient(1250px circle at 100% 100%,
            hsl(218, 41%, 45%) 15%,
            hsl(218, 41%, 30%) 35%,
            hsl(218, 41%, 20%) 75%,
            hsl(218, 41%, 19%) 80%,
            transparent 100%);
}

/* Container */
.signup-container {
    padding:20px;
    width: 90%;
    max-width: 1000px;
}

/* Card */
.signup-card {
    display: flex;
    flex-wrap: wrap;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* Form */
.signup-form {
    flex: 1;
    padding: 40px;
    min-width: 300px;
}

.signup-form h1 {
    text-align: center;
    margin-bottom: 25px;
}

/* Input */
.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 5px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

/* Checkbox */
.checkbox {
    margin: 15px 0;
    font-size: 14px;
}

/* Button */
.signup-btn {
    width: 100%;
    padding: 12px;
    background: #6a11cb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.signup-btn:hover {
    background: #5011a3;
}

/* Image */
.signup-image {
    flex: 1;
    min-width: 300px;
}

.signup-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Responsive */
@media (max-width: 768px) {
    .signup-card {
        flex-direction: column;
    }
}
</style>

<section class="background-radial-gradient">

    <div class="signup-container">
        <div class="signup-card">

            <!-- LEFT FORM -->
            <div class="signup-form">
                <h1>Sign Up</h1>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="firstName">
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="lastName">
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="userName">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password">
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="cpassword">
                    </div>

                    <div class="checkbox">
                        <input type="checkbox" required>
                        I agree to Terms of Service
                    </div>

                    <button type="submit" class="signup-btn">Register</button>
                </form>
            </div>

            <!-- RIGHT IMAGE -->
            <div class="signup-image">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp">
            </div>

        </div>
    </div>

</section>

{% endblock %}
